<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Калькулятор ипотеки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #1f2d3d;
        }

        .container {
            height: 100%;
            width: 100%;
            overflow-y: auto;
            padding: 16px;
        }

        .shadow-wrapper {
            width: 100%;
            min-height: 600px;
        }

        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 70vh;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-box {
            background: #fee2e2;
            border-left: 4px solid #dc2626;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 20px;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 16px;
            margin-top: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="shadow-wrapper">
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p>Загрузка калькулятора ипотеки...</p>
            <p style="font-size: 13px; color: #6c757d; margin-top: 8px;">Пожалуйста, подождите</p>
        </div>
    </div>
</div>

<!-- Эмуляция Telegram Web App (чтобы не было ошибки) -->
<script>
    (function() {
        if (!window.Telegram) window.Telegram = {};
        if (!window.Telegram.WebApp) {
            window.Telegram.WebApp = {
                ready: () => console.log('Telegram WebApp ready (stub)'),
                expand: () => console.log('Telegram expand (stub)'),
                close: () => console.log('Telegram close (stub)'),
                MainButton: {
                    show: () => console.log('MainButton show'),
                    hide: () => console.log('MainButton hide'),
                    setText: () => console.log('MainButton text'),
                    onClick: () => console.log('MainButton click')
                },
                onEvent: () => console.log('Telegram event')
            };
        }
        console.log('✅ Telegram WebApp готов (локальная заглушка)');
    })();
</script>

<!-- Подключаем jQuery через надёжный CDN -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Основной скрипт калькулятора (тот самый, который работает) -->
<script src="https://form.markains.ru/insuranceForm.js?p=019d01a2-d2bd-7d1f-bf82-00da44fd16d3"></script>

<script>
    let isInitialized = false;

    function hideLoader() {
        const loader = document.getElementById('loader');
        if (loader) loader.style.display = 'none';
    }

    function showError(message) {
        const container = document.querySelector('.shadow-wrapper');
        if (container) {
            container.innerHTML = `
                <div class="error-box">
                    <strong>❌ Ошибка</strong><br><br>
                    ${message}<br><br>
                    <button onclick="location.reload()">Обновить страницу</button>
                </div>
            `;
        }
    }

    function initCalculator() {
        if (isInitialized) return;

        if (typeof jQuery === 'undefined') {
            showError('Не загрузился jQuery. Проверьте интернет.');
            return;
        }

        if (typeof attachInsuranceForm !== 'function') {
            console.warn('attachInsuranceForm ещё не готова, ждём...');
            setTimeout(initCalculator, 500);
            return;
        }

        isInitialized = true;
        hideLoader();

        try {
            attachInsuranceForm('.shadow-wrapper');
            console.log('✅ Калькулятор запущен');
        } catch (e) {
            console.error(e);
            showError('Ошибка при запуске калькулятора: ' + e.message);
        }
    }

    window.addEventListener('load', function() {
        setTimeout(initCalculator, 300);
    });
</script>
</body>
</html>
