<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Пробуем загрузить Telegram Web App, но не падаем, если не загрузился -->
    <script src="https://telegram.org/js/telegram-web-app.js" onerror="handleTelegramError()"></script>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-theme-bg-color, #f5f7fa);
            color: var(--tg-theme-text-color, #333);
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 12px; }
        .shadow-wrapper { min-height: 600px; width: 100%; }
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 600px;
            flex-direction: column;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-box {
            background: #fff3f3;
            border: 1px solid #dc3545;
            border-radius: 8px;
            padding: 20px;
            margin: 20px;
            text-align: center;
            color: #dc3545;
        }
        .warning-box {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 10px;
            margin: 10px;
            text-align: center;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="shadow-wrapper" style="margin: auto; min-height: 600px;">
            <div id="loader" class="loader">
                <div class="spinner"></div>
                <p>Загрузка калькулятора...</p>
            </div>
        </div>
    </div>

    <script src="https://form.markains.ru/insuranceForm.js?p=019d01a2-d2bd-7d1f-bf82-00da44fd16d3"></script>

    <script>
        // Создаем заглушку для Telegram Web App, если не загрузился
        let tg = null;
        
        function handleTelegramError() {
            console.warn('Telegram Web App не загрузился, используем заглушку');
            document.body.insertAdjacentHTML('afterbegin', `
                <div class="warning-box">
                    ⚠️ Telegram Web App не загрузился. Калькулятор работает, но кнопка закрытия может не работать.
                </div>
            `);
            
            // Создаем заглушку
            tg = {
                ready: () => console.log('Telegram stub: ready'),
                expand: () => console.log('Telegram stub: expand'),
                close: () => window.close(),
                MainButton: {
                    show: () => console.log('Telegram stub: show main button'),
                    hide: () => console.log('Telegram stub: hide main button'),
                    setText: () => console.log('Telegram stub: set text'),
                    onClick: (cb) => { console.log('Telegram stub: onClick'); }
                },
                onEvent: () => console.log('Telegram stub: onEvent')
            };
            
            initCalculator();
        }
        
        // Ждем загрузки Telegram Web App
        window.addEventListener('load', function() {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                tg.MainButton.setText('Закрыть');
                tg.MainButton.onClick(() => tg.close());
                tg.MainButton.hide();
                tg.onEvent('viewportChanged', () => tg.expand());
                console.log('✅ Telegram Web App загружен');
                initCalculator();
            } else if (!tg) {
                // Если через 2 секунды все еще нет Telegram, создаем заглушку
                setTimeout(() => {
                    if (!window.Telegram || !window.Telegram.WebApp) {
                        handleTelegramError();
                    }
                }, 2000);
            }
        });
        
        function initCalculator() {
            console.log('Инициализация калькулятора...');
            
            // Проверка jQuery
            if (typeof jQuery === 'undefined') {
                console.error('❌ jQuery не загружен');
                showError('jQuery не загружен. Проверьте подключение к интернету.');
                return;
            }
            
            // Даем время на загрузку скрипта калькулятора
            setTimeout(function() {
                if (typeof attachInsuranceForm === 'function') {
                    console.log('✅ attachInsuranceForm найдена');
                    
                    const loader = document.getElementById('loader');
                    if (loader) loader.style.display = 'none';
                    
                    try {
                        attachInsuranceForm('.shadow-wrapper');
                        console.log('✅ Калькулятор запущен');
                        
                        if (tg && tg.MainButton) {
                            setTimeout(() => tg.MainButton.show(), 2000);
                        }
                    } catch (error) {
                        console.error('Ошибка:', error);
                        showError('Ошибка при запуске: ' + error.message);
                    }
                } else {
                    console.error('❌ attachInsuranceForm не найдена');
                    showError('Не удалось загрузить калькулятор. Проверьте доступ к form.markains.ru');
                }
            }, 2000);
        }
        
        function showError(message) {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.innerHTML = `
                    <div class="error-box">
                        <h3>❌ Ошибка</h3>
                        <p>${message}</p>
                        <button onclick="location.reload()" style="margin-top: 15px; padding: 10px 20px; cursor: pointer;">Обновить</button>
                    </div>
                `;
            }
        }
        
        // Если скрипт Telegram Web App загрузился нормально, обработаем это
        if (window.Telegram && window.Telegram.WebApp) {
            const tgReal = window.Telegram.WebApp;
            tgReal.ready();
            tgReal.expand();
            tgReal.MainButton.setText('Закрыть');
            tgReal.MainButton.onClick(() => tgReal.close());
            tgReal.MainButton.hide();
            tgReal.onEvent('viewportChanged', () => tgReal.expand());
            tg = tgReal;
            window.addEventListener('load', initCalculator);
        } else {
            // Если скрипт еще не загрузился, ждем
            window.addEventListener('load', function() {
                if (window.Telegram && window.Telegram.WebApp) {
                    const tgReal = window.Telegram.WebApp;
                    tgReal.ready();
                    tgReal.expand();
                    tgReal.MainButton.setText('Закрыть');
                    tgReal.MainButton.onClick(() => tgReal.close());
                    tgReal.MainButton.hide();
                    tg = tgReal;
                }
                initCalculator();
            });
        }
        
        // Проверка загрузки скрипта калькулятора
        const script = document.querySelector('script[src*="insuranceForm.js"]');
        if (script) {
            script.onerror = function() {
                showError('Не удалось загрузить скрипт калькулятора. Проверьте доступ к form.markains.ru');
            };
        }
    </script>
</body>
</html>
