<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--tg-theme-bg-color, #f5f7fa);
            color: var(--tg-theme-text-color, #333);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            flex: 1;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 12px;
        }
        
        .calculator-wrapper {
            background: var(--tg-theme-section-bg-color, white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .shadow-wrapper {
            min-height: 600px;
            width: 100%;
        }
        
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 600px;
            flex-direction: column;
        }
        
        .spinner {
            border: 4px solid var(--tg-theme-hint-color, #f3f3f3);
            border-top: 4px solid var(--tg-theme-button-color, #667eea);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-container {
            color: var(--tg-theme-destructive-text-color, #dc3545);
            text-align: center;
            padding: 2rem;
        }
        
        .retry-button {
            margin-top: 1.5rem;
            padding: 12px 24px;
            background: var(--tg-theme-button-color, #667eea);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="calculator-wrapper">
            <div class="shadow-wrapper" style="margin:0 auto;">
                <div id="loader" class="loader">
                    <div class="spinner"></div>
                    <p style="color: var(--tg-theme-hint-color, #999);">Загрузка калькулятора...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://form.markains.ru/insuranceForm.js?p=019d01a2-d2bd-7df1-bf82-00da44fd16d3"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        tg.MainButton.setText('Закрыть');
        tg.MainButton.onClick(() => tg.close());
        tg.MainButton.hide();

        function showError(message) {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.innerHTML = `
                    <div class="error-container">
                        <span style="font-size: 48px; display: block; margin-bottom: 16px;">⚠️</span>
                        <h3 style="margin-bottom: 12px;">Ошибка загрузки</h3>
                        <p style="color: var(--tg-theme-hint-color, #666);">${message}</p>
                        <button class="retry-button" onclick="location.reload()">
                            🔄 Обновить
                        </button>
                    </div>
                `;
            }
        }

        function hideLoader() {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.style.display = 'none';
            }
        }

        if (typeof jQuery === 'undefined') {
            showError('Не удалось загрузить jQuery');
        } else {
            setTimeout(() => {
                if (typeof attachInsuranceForm === 'function') {
                    try {
                        attachInsuranceForm('.shadow-wrapper');
                        hideLoader();
                        setTimeout(() => {
                            tg.MainButton.show();
                        }, 1000);
                    } catch (error) {
                        showError('Ошибка инициализации');
                    }
                } else {
                    showError('Не удалось загрузить калькулятор');
                }
            }, 1500);
        }

        tg.onEvent('viewportChanged', () => {
            tg.expand();
        });
    </script>
</body>
</html>
