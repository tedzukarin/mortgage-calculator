<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Пробуем загрузить Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js" onerror="handleTelegramError()"></script>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-theme-bg-color, #f5f7fa);
            color: var(--tg-theme-text-color, #333);
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 12px; }
        .shadow-wrapper { min-height: 600px; width: 100%; }
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 600px;
            flex-direction: column;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-box {
            background: #fff3f3;
            border: 1px solid #dc3545;
            border-radius: 8px;
            padding: 20px;
            margin: 20px;
            text-align: center;
            color: #dc3545;
        }
        .warning-box {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 10px;
            margin: 10px;
            text-align: center;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="shadow-wrapper" style="margin: auto; min-height: 600px;">
            <div id="loader" class="loader">
                <div class="spinner"></div>
                <p>Загрузка калькулятора...</p>
            </div>
        </div>
    </div>

    <script src="https://form.markains.ru/insuranceForm.js?p=019d01a2-d2bd-7d1f-bf82-00da44fd16d3"></script>

    <script>
        // Флаг, чтобы не вызывать функцию дважды
        let isInitialized = false;
        let tg = null;

        function handleTelegramError() {
            console.warn('Telegram Web App не загрузился, используем заглушку');
            document.body.insertAdjacentHTML('afterbegin', `
                <div class="warning-box">
                    ⚠️ Telegram Web App не загрузился. Калькулятор работает, но кнопка закрытия может не работать.
                </div>
            `);
            
            tg = {
                ready: () => {},
                expand: () => {},
                close: () => window.close(),
                MainButton: {
                    show: () => console.log('Telegram stub: show main button'),
                    hide: () => {},
                    setText: () => {},
                    onClick: () => {}
                },
                onEvent: () => {}
            };
        }

        function initCalculator() {
            // Защита от двойного вызова
            if (isInitialized) {
                console.log('Калькулятор уже инициализирован, пропускаем');
                return;
            }
            
            console.log('Инициализация калькулятора...');
            
            if (typeof jQuery === 'undefined') {
                console.error('❌ jQuery не загружен');
                showError('jQuery не загружен');
                return;
            }
            
            if (typeof attachInsuranceForm !== 'function') {
                console.error('❌ attachInsuranceForm не найдена');
                showError('Не удалось загрузить калькулятор');
                return;
            }
            
            // Помечаем как инициализированный
            isInitialized = true;
            
            // Скрываем прелоадер
            const loader = document.getElementById('loader');
            if (loader) {
                loader.style.display = 'none';
            }
            
            try {
                // Очищаем контейнер, если там уже что-то есть
                const container = document.querySelector('.shadow-wrapper');
                if (container && container.children.length > 1) {
                    // Если есть лишние элементы, удаляем
                    while (container.children.length > 1) {
                        container.removeChild(container.lastChild);
                    }
                }
                
                // Вызываем функцию только один раз
                attachInsuranceForm('.shadow-wrapper');
                console.log('✅ Калькулятор успешно запущен');
                
                // Показываем кнопку закрытия через пару секунд
                if (tg && tg.MainButton) {
                    setTimeout(() => {
                        tg.MainButton.show();
                    }, 2000);
                }
            } catch (error) {
                console.error('Ошибка:', error);
                isInitialized = false;
                showError('Ошибка при запуске: ' + error.message);
            }
        }

        function showError(message) {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.innerHTML = `
                    <div class="error-box">
                        <h3>❌ Ошибка</h3>
                        <p>${message}</p>
                        <button onclick="location.reload()" style="margin-top: 15px; padding: 10px 20px; cursor: pointer;">Обновить</button>
                    </div>
                `;
            }
        }

        // Настройка Telegram Web App
        function setupTelegram() {
            if (window.Telegram && window.Telegram.WebApp) {
                const tgReal = window.Telegram.WebApp;
                tgReal.ready();
                tgReal.expand();
                tgReal.MainButton.setText('Закрыть');
                tgReal.MainButton.onClick(() => tgReal.close());
                tgReal.MainButton.hide();
                tgReal.onEvent('viewportChanged', () => tgReal.expand());
                tg = tgReal;
                console.log('✅ Telegram Web App настроен');
            }
        }

        // Запускаем всё после полной загрузки страницы
        window.addEventListener('load', function() {
            setupTelegram();
            
            // Даем время на загрузку скрипта калькулятора
            setTimeout(initCalculator, 1500);
        });
        
        // Если Telegram скрипт не загрузился, вызываем заглушку
        setTimeout(function() {
            if (!window.Telegram || !window.Telegram.WebApp) {
                if (!tg) handleTelegramError();
            }
        }, 2000);
        
        // Проверка загрузки скрипта калькулятора
        const script = document.querySelector('script[src*="insuranceForm.js"]');
        if (script) {
            script.onerror = function() {
                showError('Не удалось загрузить скрипт калькулятора');
            };
        }
    </script>
</body>
</html>
