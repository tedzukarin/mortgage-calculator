<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://telegram.org/js/telegram-web-app.js" onerror="handleTelegramError()"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            overflow-x: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-theme-bg-color, #f5f7fa);
            color: var(--tg-theme-text-color, #333);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Контейнер с прокруткой */
        .container {
            flex: 1;
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch; /* Плавный скролл на iOS */
        }
        
        /* Обертка для калькулятора */
        .calculator-wrapper {
            width: 100%;
            min-height: 100%;
            background: var(--tg-theme-section-bg-color, white);
        }
        
        /* Основной контейнер калькулятора */
        .shadow-wrapper {
            width: 100%;
            min-height: 100vh;
            position: relative;
        }
        
        /* Стили для элементов внутри калькулятора */
        .shadow-wrapper * {
            max-width: 100%;
            box-sizing: border-box;
        }
        
        /* Исправление для выпадающих списков и модальных окон */
        .shadow-wrapper select,
        .shadow-wrapper input,
        .shadow-wrapper button {
            -webkit-appearance: none;
            appearance: none;
        }
        
        /* Обеспечиваем корректное отображение теней и попапов */
        .shadow-wrapper [class*="popup"],
        .shadow-wrapper [class*="modal"],
        .shadow-wrapper [class*="dropdown"] {
            position: fixed !important;
            z-index: 9999 !important;
        }
        
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        
        .spinner {
            border: 4px solid var(--tg-theme-hint-color, #f3f3f3);
            border-top: 4px solid var(--tg-theme-button-color, #667eea);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-box {
            background: #fff3f3;
            border: 1px solid #dc3545;
            border-radius: 8px;
            padding: 20px;
            margin: 20px;
            text-align: center;
            color: #dc3545;
        }
        
        .warning-box {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 10px;
            margin: 10px;
            text-align: center;
            font-size: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        /* Стили для скроллбара (опционально) */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--tg-theme-section-bg-color, #f1f1f1);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--tg-theme-hint-color, #888);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--tg-theme-button-color, #555);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="calculator-wrapper">
            <div class="shadow-wrapper" style="margin: 0; padding: 0; width: 100%;">
                <div id="loader" class="loader">
                    <div class="spinner"></div>
                    <p style="color: var(--tg-theme-hint-color, #999);">Загрузка калькулятора...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://form.markains.ru/insuranceForm.js?p=019d01a2-d2bd-7d1f-bf82-00da44fd16d3"></script>

    <script>
        let isInitialized = false;
        let tg = null;

        function handleTelegramError() {
            console.warn('Telegram Web App не загрузился, используем заглушку');
            const warning = document.createElement('div');
            warning.className = 'warning-box';
            warning.innerHTML = '⚠️ Telegram Web App не загрузился. Калькулятор работает, но кнопка закрытия может не работать.';
            document.body.insertBefore(warning, document.body.firstChild);
            
            tg = {
                ready: () => {},
                expand: () => {},
                close: () => window.close(),
                MainButton: {
                    show: () => console.log('Telegram stub: show main button'),
                    hide: () => {},
                    setText: () => {},
                    onClick: () => {}
                },
                onEvent: () => {}
            };
        }

        function initCalculator() {
            if (isInitialized) {
                console.log('Калькулятор уже инициализирован');
                return;
            }
            
            console.log('Инициализация калькулятора...');
            
            if (typeof jQuery === 'undefined') {
                console.error('❌ jQuery не загружен');
                showError('jQuery не загружен');
                return;
            }
            
            if (typeof attachInsuranceForm !== 'function') {
                console.error('❌ attachInsuranceForm не найдена');
                showError('Не удалось загрузить калькулятор');
                return;
            }
            
            isInitialized = true;
            
            const loader = document.getElementById('loader');
            if (loader) {
                loader.style.display = 'none';
            }
            
            try {
                // Вызываем функцию
                attachInsuranceForm('.shadow-wrapper');
                console.log('✅ Калькулятор успешно запущен');
                
                // Попытка исправить стили внутри калькулятора после загрузки
                setTimeout(() => {
                    fixCalculatorStyles();
                }, 1000);
                
                if (tg && tg.MainButton) {
                    setTimeout(() => {
                        tg.MainButton.show();
                    }, 2000);
                }
            } catch (error) {
                console.error('Ошибка:', error);
                isInitialized = false;
                showError('Ошибка при запуске: ' + error.message);
            }
        }
        
        // Функция для исправления стилей внутри калькулятора
        function fixCalculatorStyles() {
            const wrapper = document.querySelector('.shadow-wrapper');
            if (!wrapper) return;
            
            // Ищем элементы, которые могут быть проблемными
            const selects = wrapper.querySelectorAll('select');
            const dropdowns = wrapper.querySelectorAll('[class*="dropdown"], [class*="select"]');
            
            // Добавляем стили для корректного отображения
            const style = document.createElement('style');
            style.textContent = `
                .shadow-wrapper {
                    overflow: visible !important;
                    min-height: 100% !important;
                }
                .shadow-wrapper select {
                    display: block !important;
                    width: 100% !important;
                    padding: 10px !important;
                    margin: 5px 0 !important;
                    background: var(--tg-theme-section-bg-color, white) !important;
                    border: 1px solid var(--tg-theme-hint-color, #ddd) !important;
                    border-radius: 8px !important;
                    font-size: 16px !important;
                }
                .shadow-wrapper button {
                    touch-action: manipulation !important;
                }
                /* Исправление для выпадающих списков */
                .shadow-wrapper [role="listbox"],
                .shadow-wrapper .dropdown-menu {
                    position: absolute !important;
                    z-index: 10000 !important;
                    max-height: 300px !important;
                    overflow-y: auto !important;
                }
            `;
            document.head.appendChild(style);
            
            // Принудительно обновляем высоту контейнера
            const container = document.querySelector('.container');
            if (container) {
                container.style.height = 'auto';
                container.style.minHeight = '100vh';
            }
            
            console.log('✅ Стили калькулятора исправлены');
        }

        function showError(message) {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.innerHTML = `
                    <div class="error-box">
                        <h3>❌ Ошибка</h3>
                        <p>${message}</p>
                        <button onclick="location.reload()" style="margin-top: 15px; padding: 10px 20px; cursor: pointer;">Обновить</button>
                    </div>
                `;
            }
        }

        function setupTelegram() {
            if (window.Telegram && window.Telegram.WebApp) {
                const tgReal = window.Telegram.WebApp;
                tgReal.ready();
                tgReal.expand();
                tgReal.MainButton.setText('Закрыть');
                tgReal.MainButton.onClick(() => tgReal.close());
                tgReal.MainButton.hide();
                tgReal.onEvent('viewportChanged', () => tgReal.expand());
                tg = tgReal;
                console.log('✅ Telegram Web App настроен');
            }
        }

        // Запуск
        window.addEventListener('load', function() {
            setupTelegram();
            setTimeout(initCalculator, 1500);
        });
        
        setTimeout(function() {
            if (!window.Telegram || !window.Telegram.WebApp) {
                if (!tg) handleTelegramError();
            }
        }, 2000);
        
        const script = document.querySelector('script[src*="insuranceForm.js"]');
        if (script) {
            script.onerror = function() {
                showError('Не удалось загрузить скрипт калькулятора');
            };
        }
    </script>
</body>
</html>
