<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- jQuery (обязательно для калькулятора) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--tg-theme-bg-color, #f5f7fa);
            color: var(--tg-theme-text-color, #333);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            flex: 1;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 12px;
        }
        
        .calculator-wrapper {
            background: var(--tg-theme-section-bg-color, white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .shadow-wrapper {
            min-height: 600px;
            width: 100%;
        }
        
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 600px;
            flex-direction: column;
        }
        
        .spinner {
            border: 4px solid var(--tg-theme-hint-color, #f3f3f3);
            border-top: 4px solid var(--tg-theme-button-color, #667eea);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="calculator-wrapper">
            <!-- Тот самый shadow-wrapper с style="margin: auto" как в их примере -->
            <div class="shadow-wrapper" style="margin: auto; min-height: 600px;">
                <!-- Прелоадер -->
                <div id="loader" class="loader">
                    <div class="spinner"></div>
                    <p style="color: var(--tg-theme-hint-color, #999);">Загрузка калькулятора...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ИХ строка с правильным параметром -->
    <script src="https://form.markains.ru/insuranceForm.js?p=019d01a2-d2bd-7d1f-bf82-00da44fd16d3"></script>

    <!-- ИХ упрощенный код инициализации + наша Telegram логика -->
    <script>
        // Telegram Mini App инициализация
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Кнопка закрытия
        tg.MainButton.setText('Закрыть');
        tg.MainButton.onClick(() => tg.close());
        tg.MainButton.hide();

        // ИХ способ инициализации калькулятора
        document.addEventListener('DOMContentLoaded', function () {
            // Скрываем прелоадер через секунду (на всякий случай)
            setTimeout(() => {
                const loader = document.getElementById('loader');
                if (loader) {
                    loader.style.display = 'none';
                }
            }, 1000);
            
            // Вызываем их функцию
            if (typeof attachInsuranceForm === 'function') {
                attachInsuranceForm('.shadow-wrapper');
                // Показываем кнопку закрытия
                setTimeout(() => {
                    tg.MainButton.show();
                }, 2000);
            } else {
                console.error('Функция attachInsuranceForm не найдена');
                document.querySelector('.shadow-wrapper').innerHTML = `
                    <div style="color: #dc3545; text-align: center; padding: 2rem;">
                        <h3>Ошибка загрузки калькулятора</h3>
                        <button onclick="location.reload()" style="margin-top: 1rem; padding: 10px 20px; background: var(--tg-theme-button-color, #667eea); color: white; border: none; border-radius: 5px;">
                            Обновить
                        </button>
                    </div>
                `;
            }
        });

        // Обработка изменения размера экрана
        tg.onEvent('viewportChanged', () => {
            tg.expand();
        });
    </script>
</body>
</html>
