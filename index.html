<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-theme-bg-color, #f5f7fa);
            color: var(--tg-theme-text-color, #333);
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 12px; }
        .shadow-wrapper { min-height: 600px; width: 100%; }
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 600px;
            flex-direction: column;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-box {
            background: #fff3f3;
            border: 1px solid #dc3545;
            border-radius: 8px;
            padding: 20px;
            margin: 20px;
            text-align: center;
            color: #dc3545;
        }
        .debug-info {
            background: #f0f0f0;
            border-radius: 8px;
            padding: 10px;
            margin: 10px;
            font-family: monospace;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="shadow-wrapper" style="margin: auto; min-height: 600px;">
            <div id="loader" class="loader">
                <div class="spinner"></div>
                <p>Загрузка калькулятора...</p>
                <p style="font-size: 12px; color: #999; margin-top: 10px;">Если долго не загружается, проверьте консоль (F12)</p>
            </div>
        </div>
    </div>
    
    <div id="debug" class="debug-info"></div>

    <script src="https://form.markains.ru/insuranceForm.js?p=019d01a2-d2bd-7d1f-bf82-00da44fd16d3"></script>

    <script>
        // Telegram инициализация
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        tg.MainButton.setText('Закрыть');
        tg.MainButton.onClick(() => tg.close());
        tg.MainButton.hide();

        // Функция для вывода отладки
        function debugLog(msg) {
            console.log(msg);
            const debugDiv = document.getElementById('debug');
            if (debugDiv) {
                debugDiv.style.display = 'block';
                debugDiv.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
            }
        }

        debugLog('Страница загружена, проверяем jQuery...');
        
        // Проверка jQuery
        if (typeof jQuery === 'undefined') {
            debugLog('❌ ОШИБКА: jQuery не загружен!');
            document.getElementById('loader').innerHTML = `
                <div class="error-box">
                    <h3>❌ Ошибка: jQuery не загружен</h3>
                    <p>Проверьте подключение к интернету и перезагрузите страницу</p>
                    <button onclick="location.reload()" style="margin-top: 15px; padding: 10px 20px;">Обновить</button>
                </div>
            `;
        } else {
            debugLog('✅ jQuery загружен, версия: ' + jQuery.fn.jquery);
            
            // Ждем загрузку DOM
            document.addEventListener('DOMContentLoaded', function() {
                debugLog('DOMContentLoaded событие сработало');
                
                // Даем время на загрузку скрипта калькулятора
                setTimeout(function() {
                    debugLog('Проверяем attachInsuranceForm...');
                    
                    if (typeof attachInsuranceForm === 'function') {
                        debugLog('✅ Функция attachInsuranceForm найдена!');
                        
                        try {
                            // Скрываем прелоадер
                            const loader = document.getElementById('loader');
                            if (loader) {
                                loader.style.display = 'none';
                            }
                            
                            debugLog('Вызываем attachInsuranceForm(".shadow-wrapper")...');
                            attachInsuranceForm('.shadow-wrapper');
                            debugLog('✅ Калькулятор вызван успешно');
                            
                            // Показываем кнопку закрытия
                            setTimeout(() => {
                                tg.MainButton.show();
                                debugLog('Кнопка закрытия показана');
                            }, 2000);
                            
                        } catch (error) {
                            debugLog('❌ Ошибка при вызове: ' + error.message);
                            document.getElementById('loader').innerHTML = `
                                <div class="error-box">
                                    <h3>❌ Ошибка при запуске калькулятора</h3>
                                    <p>${error.message}</p>
                                    <button onclick="location.reload()" style="margin-top: 15px; padding: 10px 20px;">Обновить</button>
                                </div>
                            `;
                        }
                    } else {
                        debugLog('❌ Функция attachInsuranceForm НЕ найдена!');
                        
                        // Показываем доступные функции
                        const allFuncs = [];
                        for (let key in window) {
                            if (typeof window[key] === 'function') {
                                allFuncs.push(key);
                            }
                        }
                        debugLog('Всего функций: ' + allFuncs.length);
                        debugLog('Функции с "form": ' + allFuncs.filter(f => f.toLowerCase().includes('form')).join(', '));
                        debugLog('Функции с "insurance": ' + allFuncs.filter(f => f.toLowerCase().includes('insurance')).join(', '));
                        
                        document.getElementById('loader').innerHTML = `
                            <div class="error-box">
                                <h3>❌ Калькулятор не загрузился</h3>
                                <p>Библиотека не инициализировала функцию attachInsuranceForm</p>
                                <p style="font-size: 12px; margin-top: 10px;">Проверьте консоль (F12) для деталей</p>
                                <button onclick="location.reload()" style="margin-top: 15px; padding: 10px 20px;">Обновить</button>
                            </div>
                        `;
                    }
                }, 2000); // Ждем 2 секунды
            });
        }

        // Дополнительная проверка после полной загрузки
        window.addEventListener('load', function() {
            debugLog('Событие load сработало');
        });
        
        // Проверка загрузки скрипта калькулятора
        const script = document.querySelector('script[src*="insuranceForm.js"]');
        if (script) {
            script.onload = function() {
                debugLog('✅ Скрипт insuranceForm.js загружен');
            };
            script.onerror = function() {
                debugLog('❌ Ошибка загрузки скрипта insuranceForm.js!');
                document.getElementById('loader').innerHTML = `
                    <div class="error-box">
                        <h3>❌ Не удалось загрузить скрипт калькулятора</h3>
                        <p>Проверьте доступ к form.markains.ru</p>
                        <button onclick="location.reload()">Обновить</button>
                    </div>
                `;
            };
        }
        
        tg.onEvent('viewportChanged', () => tg.expand());
    </script>
</body>
</html>
